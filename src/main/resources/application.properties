# Database Configuration
# Use environment variables for real credentials; the default H2 value keeps local development runnable without committed secrets.
spring.datasource.url=${BLOG_DB_URL:jdbc:h2:file:./data/blogdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${BLOG_DB_USERNAME:sa}
spring.datasource.password=${BLOG_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${BLOG_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${BLOG_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
# Active signing key must come from the environment in non-test environments.
blog.app.jwtSecret=${BLOG_JWT_SECRET}
# Comma-separated previous secrets allow safe key rotation without invalidating all existing tokens immediately.
blog.app.jwtPreviousSecrets=${BLOG_JWT_PREVIOUS_SECRETS:}
blog.app.jwtExpirationMs=${BLOG_JWT_EXPIRATION_MS:86400000}

# Public endpoint rate limits
blog.app.security.rate-limit.login.ip.max-requests=${BLOG_RATE_LIMIT_LOGIN_IP_MAX:20}
blog.app.security.rate-limit.login.ip.window-seconds=${BLOG_RATE_LIMIT_LOGIN_IP_WINDOW_SECONDS:900}
blog.app.security.rate-limit.login.user.max-requests=${BLOG_RATE_LIMIT_LOGIN_USER_MAX:10}
blog.app.security.rate-limit.login.user.window-seconds=${BLOG_RATE_LIMIT_LOGIN_USER_WINDOW_SECONDS:900}
blog.app.security.rate-limit.register.ip.max-requests=${BLOG_RATE_LIMIT_REGISTER_IP_MAX:10}
blog.app.security.rate-limit.register.ip.window-seconds=${BLOG_RATE_LIMIT_REGISTER_IP_WINDOW_SECONDS:3600}
blog.app.security.rate-limit.register.user.max-requests=${BLOG_RATE_LIMIT_REGISTER_USER_MAX:5}
blog.app.security.rate-limit.register.user.window-seconds=${BLOG_RATE_LIMIT_REGISTER_USER_WINDOW_SECONDS:3600}

# Server Configuration
server.port=${SERVER_PORT:8080}

# Logging
logging.level.org.springframework.security=${BLOG_SECURITY_LOG_LEVEL:INFO}
