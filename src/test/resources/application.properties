spring.datasource.url=jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

blog.app.jwtSecret=TestWriteFlowBackendSecretKeyForJwtAuth123456789
blog.app.jwtPreviousSecrets=
blog.app.jwtExpirationMs=86400000

blog.app.security.rate-limit.login.ip.max-requests=5
blog.app.security.rate-limit.login.ip.window-seconds=900
blog.app.security.rate-limit.login.user.max-requests=2
blog.app.security.rate-limit.login.user.window-seconds=900
blog.app.security.rate-limit.register.ip.max-requests=2
blog.app.security.rate-limit.register.ip.window-seconds=3600
blog.app.security.rate-limit.register.user.max-requests=3
blog.app.security.rate-limit.register.user.window-seconds=3600

logging.level.org.springframework.security=ERROR
